version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    reviewers:
      - "ambicuity"
    labels:
      - "dependencies"
      - "chore"
    commit-message:
      prefix: "chore(deps)"
    groups:
      production:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "vitest"
          - "tsx"
        update-types:
          - "minor"
          - "patch"
      dev:
        patterns:
          - "@types/*"
          - "vitest"
          - "tsx"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    reviewers:
      - "ambicuity"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
