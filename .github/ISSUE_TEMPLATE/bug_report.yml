name: Bug Report
description: Report a bug or unexpected behavior in KINDX
title: "bug: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I run `kindx search`, it..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior.
      placeholder: |
        1. Run `kindx collection add ~/notes --name notes`
        2. Run `kindx embed`
        3. Run `kindx search "example query"`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      value: |
        - KINDX version: (run `kindx --version`)
        - Node.js version: (run `node --version`)
        - OS: (e.g., macOS 15.2, Ubuntu 24.04, Windows 11)
        - Architecture: (e.g., ARM64, x86_64)
        - Shell: (e.g., zsh, bash, PowerShell)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output or terminal output here.
      render: shell

  - type: dropdown
    id: search-mode
    attributes:
      label: Which search mode is affected?
      options:
        - "search (BM25)"
        - "vsearch (vector)"
        - "query (hybrid)"
        - "Not search-related"
        - "All modes"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I have included the KINDX version, Node.js version, and OS in the environment section.
          required: true
