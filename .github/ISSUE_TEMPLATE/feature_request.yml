name: Feature Request
description: Suggest a new feature or enhancement for KINDX
title: "feat: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe the problem you are trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration with the current behavior?
      placeholder: "I am always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Area of Impact
      options:
        - "Search quality (BM25, vector, hybrid)"
        - "CLI interface and commands"
        - "MCP server"
        - "Collection management"
        - "Embedding and indexing"
        - "Output formatting"
        - "Configuration"
        - "Performance"
        - "Documentation"
        - "CI/CD and infrastructure"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues and feature requests to ensure this is not a duplicate.
          required: true
