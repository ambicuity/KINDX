name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest

    steps:
      - name: Mark and close stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity in 30 days. It will be closed in 7 days if no further
            activity occurs. If this issue is still relevant, please add a comment
            to keep it open.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity in 30 days. It will be closed in 7 days if no
            further activity occurs. If you are still working on this, please add a
            comment or push new commits.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If the issue
            persists, please feel free to reopen it with additional context.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Please feel free to reopen it when you are ready to continue.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,architecture'
          exempt-pr-labels: 'pinned,security'
