name: Publish From Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g., v1.1.0)'
        required: true
        default: 'v1.1.0'
      dry_run:
        description: 'Run npm publish in dry-run mode only'
        required: true
        type: boolean
        default: false
      publish_targets:
        description: 'Where to publish this package version'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - npm
          - github

concurrency:
  group: publish-from-tag-${{ github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish npm Package From Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          always-auth: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve package metadata
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)
          MARKET_VERSION=$(jq -r '.plugins[0].version' .agent-plugin/marketplace.json)
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "market_version=${MARKET_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing candidate: ${NAME}@${VERSION} from tag ${{ github.event.inputs.tag }}"

      - name: Guardrail (marketplace metadata in sync)
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.pkg.outputs.version }}'
          MARKET_VERSION='${{ steps.pkg.outputs.market_version }}'
          if [[ "$VERSION" != "$MARKET_VERSION" ]]; then
            echo "::error::.agent-plugin/marketplace.json version (${MARKET_VERSION}) must match package.json (${VERSION})."
            exit 1
          fi

      - name: Guardrail (already published on npmjs)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          TARGET='${{ github.event.inputs.publish_targets }}'
          if [[ "$TARGET" =~ ^(both|npm)$ ]] && npm view "${NAME}@${VERSION}" version --silent --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "::error::${NAME}@${VERSION} is already published on npm. Refusing to republish."
            exit 1
          fi

      - name: Guardrail (already published on GitHub Packages)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          TARGET='${{ github.event.inputs.publish_targets }}'
          if [[ "$TARGET" =~ ^(both|github)$ ]] && npm view "${NAME}@${VERSION}" version --silent --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "::error::${NAME}@${VERSION} is already published on GitHub Packages. Refusing to republish."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' && (github.event.inputs.publish_targets == 'both' || github.event.inputs.publish_targets == 'npm') }}
        run: npm publish --provenance --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' && (github.event.inputs.publish_targets == 'both' || github.event.inputs.publish_targets == 'github') }}
        shell: bash
        run: |
          set -euo pipefail
          printf '@ambicuity:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\nregistry=https://npm.pkg.github.com\n' > .npmrc
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.publishConfig={...(p.publishConfig||{}), registry:'https://npm.pkg.github.com'}; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"
          npm publish --registry=https://npm.pkg.github.com --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_targets == 'both' || github.event.inputs.publish_targets == 'npm') }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event.inputs.publish_targets == 'both' || github.event.inputs.publish_targets == 'github') }}
        shell: bash
        run: |
          set -euo pipefail
          printf '@ambicuity:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\nregistry=https://npm.pkg.github.com\n' > .npmrc
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.publishConfig={...(p.publishConfig||{}), registry:'https://npm.pkg.github.com'}; fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');"
          npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
