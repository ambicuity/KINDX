name: Release Please

on:
  push:
    branches: [main]

concurrency:
  group: release-please-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          always-auth: true

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: npm ci

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: npm run build

      - name: Resolve package metadata
        if: ${{ steps.release.outputs.release_created }}
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          NAME=$(jq -r '.name' package.json)
          VERSION=$(jq -r '.version' package.json)
          MARKET_VERSION=$(jq -r '.plugins[0].version' .agent-plugin/marketplace.json)
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "market_version=${MARKET_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Guardrail (marketplace metadata in sync)
        if: ${{ steps.release.outputs.release_created }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.pkg.outputs.version }}'
          MARKET_VERSION='${{ steps.pkg.outputs.market_version }}'
          if [[ "$VERSION" != "$MARKET_VERSION" ]]; then
            echo "::error::.agent-plugin/marketplace.json version (${MARKET_VERSION}) must match package.json (${VERSION})."
            exit 1
          fi

      - name: Guardrail (npmjs already published)
        if: ${{ steps.release.outputs.release_created }}
        shell: bash
        run: |
          set -euo pipefail
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          if npm view "${NAME}@${VERSION}" version --silent --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "::error::${NAME}@${VERSION} already exists on npmjs. Refusing duplicate publish."
            exit 1
          fi

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Guardrail (GitHub Packages already published)
        if: ${{ steps.release.outputs.release_created }}
        shell: bash
        run: |
          set -euo pipefail
          NAME='${{ steps.pkg.outputs.name }}'
          VERSION='${{ steps.pkg.outputs.version }}'
          if npm view "${NAME}@${VERSION}" version --silent --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "::error::${NAME}@${VERSION} already exists on GitHub Packages. Refusing duplicate publish."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign release artifacts
        if: ${{ steps.release.outputs.release_created }}
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: ./dist/**/*.js

  publish-binaries:
    name: Publish Linux Binaries
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Prune dev dependencies
        run: npm prune --omit=dev
        
      - name: Package binary
        run: tar -czvf kindx-linux-${{ matrix.arch }}.tar.gz package.json dist/ bin/ node_modules/
        
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} kindx-linux-${{ matrix.arch }}.tar.gz
