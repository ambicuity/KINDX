name: Issue Commands

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  handle-issue-commands:
    name: Handle `/assign` and `/working`
    if: >
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Process issue commands
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.comment.body || "";
            const match = body.match(/^\/(assign|working|unassign|done|help)\b/m);

            if (!match) {
              core.info("No supported issue command found.");
              return;
            }

            const command = `/${match[1]}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const actor = context.payload.comment.user.login;
            const inProgressLabel = "status/in-progress";

            async function getIssue() {
              const issue = await github.rest.issues.get({
                owner,
                repo,
                issue_number,
              });

              const assignees = issue.data.assignees.map((user) => user.login);
              const labels = issue.data.labels
                .map((label) => (typeof label === "string" ? label : label.name))
                .filter(Boolean);

              return { assignees, labels };
            }

            async function leaveComment(message) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: message,
              });
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function removeLabelIfPresent(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function assignActor() {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: [actor],
                });
                return true;
              } catch (error) {
                await leaveComment(
                  `I could not assign @${actor} automatically. A maintainer may need to assign this issue manually.\n\n` +
                  `GitHub API error: \`${error.message}\``
                );
                return false;
              }
            }

            if (command === "/help") {
              await leaveComment(
                [
                  "Supported issue commands:",
                  "",
                  "- `/assign` — assign the issue to yourself if it is unclaimed",
                  "- `/working` — assign the issue to yourself and mark it as `status/in-progress`",
                  "- `/unassign` — remove yourself from the assignee list",
                  "- `/done` — remove yourself from the assignee list and clear `status/in-progress` if nobody else is assigned",
                  "- `@coderabbitai plan` — ask CodeRabbit to generate an implementation plan on the issue",
                ].join("\n")
              );
              return;
            }

            const { assignees, labels } = await getIssue();
            const assignedToSomeoneElse = assignees.length > 0 && !assignees.includes(actor);

            if ((command === "/assign" || command === "/working") && assignedToSomeoneElse) {
              const owners = assignees.map((login) => `@${login}`).join(", ");
              await leaveComment(
                `This issue is currently assigned to ${owners}. Please coordinate with the current assignee before claiming it.`
              );
              return;
            }

            if (command === "/assign") {
              if (!assignees.includes(actor)) {
                const assigned = await assignActor();
                if (!assigned) {
                  return;
                }
              }

              await leaveComment(
                `Assigned this issue to @${actor}. When you begin implementation, comment \`/working\` to mark it as in progress.`
              );
              return;
            }

            if (command === "/working") {
              if (!assignees.includes(actor)) {
                const assigned = await assignActor();
                if (!assigned) {
                  return;
                }
              }

              await ensureLabel(
                inProgressLabel,
                "0e8a16",
                "A contributor is actively working on this issue"
              );

              if (!labels.includes(inProgressLabel)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [inProgressLabel],
                });
              }

              await removeLabelIfPresent("status/ready");

              await leaveComment(
                `Marked this issue as in progress for @${actor}. If you need implementation guidance, comment \`@coderabbitai plan\` on this issue.`
              );
              return;
            }

            if (command === "/unassign" || command === "/done") {
              if (!assignees.includes(actor)) {
                await leaveComment(`@${actor} is not currently assigned to this issue.`);
                return;
              }

              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number,
                assignees: [actor],
              });

              const updated = await getIssue();

              if (updated.assignees.length === 0) {
                await removeLabelIfPresent(inProgressLabel);
              }

              const message =
                command === "/done"
                  ? `Removed @${actor} from the assignee list and updated the issue status.`
                  : `Removed @${actor} from the assignee list.`;

              await leaveComment(message);
            }
