name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'package.json'
      - 'vitest.config.ts'

permissions: read-all

jobs:
  test:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test
        env:
          CI: true
