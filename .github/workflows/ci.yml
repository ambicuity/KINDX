name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'bin/kindx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'schema-migration.ts'
      - 'packages/**'
      - 'python/kindx-langchain/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'bin/kindx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'schema-migration.ts'
      - 'packages/**'
      - 'python/kindx-langchain/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  node:
    name: Node ${{ matrix.node-version }} Build, Test, and Pack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Build SDK packages
        run: npm run build:packages

      - name: Run unit and integration tests with coverage and JUnit
        run: npm run test:ci
        env:
          CI: 'true'

      - name: Upload coverage to Codecov
        if: matrix.node-version == '22'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/

      - name: Run SDK package tests
        run: npm run test:packages
        env:
          CI: 'true'

      - name: Set up Python
        if: matrix.node-version == '22'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run kindx-langchain tests
        if: matrix.node-version == '22'
        run: python -m unittest discover -s python/kindx-langchain/tests -v

      - name: Verify publishable package contents
        run: npm pack --dry-run

  benchmarks:
    name: Enforced Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: node
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run enforced benchmarks
        run: npm run bench:all
        env:
          CI: 'true'

  docker-smoke:
    name: Docker Image Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: node
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t kindx-smoke .
      - name: Smoke test - version check
        run: docker run --rm kindx-smoke node dist/kindx.js --version
      - name: Smoke test - help output
        run: docker run --rm kindx-smoke node dist/kindx.js --help

  sqlcipher-smoke:
    name: SQLCipher Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Install SQLCipher-capable sqlite driver
        run: npm install --no-save better-sqlite3-multiple-ciphers

      - name: Build
        run: npm run build

      - name: Encrypted migration smoke
        run: |
          export KINDX_CONFIG_DIR=/tmp/kindx-config
          export INDEX_PATH=/tmp/kindx-cache/index.sqlite
          mkdir -p /tmp/kindx-corpus /tmp/kindx-config /tmp/kindx-cache
          printf "# Cipher Smoke\n\nhello world\n" > /tmp/kindx-corpus/smoke.md
          node dist/kindx.js collection add /tmp/kindx-corpus --name smoke --mask "**/*.md"
          node dist/kindx.js update
          KINDX_ENCRYPTION_KEY="ci-smoke-key-16chars-or-more" node dist/kindx.js status
          node -e "const fs=require('fs');const h=fs.readFileSync('/tmp/kindx-cache/index.sqlite').subarray(0,16).toString('ascii'); if(h==='SQLite format 3\\u0000'){throw new Error('index is still plaintext');}"
