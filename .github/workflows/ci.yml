name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'bin/kindx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'schema-migration.ts'
      - 'packages/**'
      - 'python/kindx-langchain/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'bin/kindx'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vitest.config.ts'
      - 'schema-migration.ts'
      - 'packages/**'
      - 'python/kindx-langchain/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  node:
    name: Node 22 Build, Test, and Pack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Build SDK packages
        run: npm run build:packages

      - name: Run unit and integration tests
        run: npm test
        env:
          CI: 'true'

      - name: Run SDK package tests
        run: npm run test:packages
        env:
          CI: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run kindx-langchain tests
        run: python -m unittest discover -s python/kindx-langchain/tests -v

      - name: Verify publishable package contents
        run: npm pack --dry-run
