name: CI -- Lint and Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'specs/**'
      - 'package.json'
      - 'tsconfig*.json'
      - '.github/workflows/**'

permissions: read-all

jobs:
  lint-and-validate:
    name: TypeScript Lint and Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Verify no circular imports
        run: |
          # Check for any obvious circular dependency indicators
          echo "Checking for circular imports..."
          npx madge --circular engine/ 2>/dev/null || echo "madge not available, skipping circular import check"
