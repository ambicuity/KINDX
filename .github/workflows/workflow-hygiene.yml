name: Workflow Hygiene

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/labeler.yml'
      - '.coderabbit.yaml'
      - '.gemini/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/labeler.yml'
      - '.coderabbit.yaml'
      - '.gemini/**'

concurrency:
  group: workflows-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint workflow files
        uses: devops-actions/actionlint@469810fd82c015d3c43815cd2b0e4d02eecc4819 # v0.1.11

  reviewer-config:
    name: Reviewer Config Syntax
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse YAML configuration files
        run: |
          ruby -e 'require "yaml"; %w[.github/dependabot.yml .github/labeler.yml .coderabbit.yaml .gemini/config.yaml].each { |path| next unless File.exist?(path); YAML.load_file(path); puts("validated #{path}") }'
